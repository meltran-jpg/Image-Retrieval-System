


# this github actions workflow runs tests whenever we push code or open a pull request
# it makes sure our code changes don't break anything by running the tests automatically




name: Python CI

# triggers when run this workflow when code is pushed to main/ master branches
# or when a pull request is opened against those branches.
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# define the jobs to run in this workflow
jobs:
  test:
    # run the job on github's hosted ubuntu virtual machine
    runs-on: ubuntu-latest
    # test against multiple python versions in parallel
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    # steps to execute in the job
    steps:
      # step 1: download the repository code to the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # step2: install the specified python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      #step 3: upgrade pip to the latest version
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # step 4: install any dependencies needed for testing
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip

      #step 5:execute the unit test suite
      - name: Run unit tests
        run: python -m unittest discover -s tests

  lint:
    # run linting checks on ubuntu
    runs-on: ubuntu-latest
    steps:
      # step 1: checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # step 2: install python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # step 3: install flake8 for linting
      - name: Install flake8
        run: python -m pip install flake8

      # step 4: run flake8 to check code style
      - name: Run flake8
        run: flake8 image_retrieval_system tests --count --select=E9,F63,F7,F82 --show-source --statistics





  type-check:
    # run type checking with mypy on ubuntu
    runs-on: ubuntu-latest
    steps:
      # step 1: checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # step 2: install python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # step 3: install mypy for type checking
      - name: Install mypy
        run: python -m pip install mypy

      # step 4: run mypy to check type hints
      - name: Run mypy type checking
        run: mypy image_retrieval_system --ignore-missing-imports

  coverage:
    # run code coverage analysis on ubuntu
    runs-on: ubuntu-latest
    steps:
      # step 1: checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # step 2: install python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # step 3: install coverage tool
      - name: Install coverage
        run: python -m pip install coverage

      # step 4: run tests with coverage
      - name: Run tests with coverage
        run: coverage run -m unittest discover -s tests

      # step 5: generate coverage report
      - name: Generate coverage report
        run: coverage report -m






  format-check:
    # check code formatting with black on ubuntu
    runs-on: ubuntu-latest
    steps:
      # step 1: checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # step 2: install python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # step 3: install black for formatting
      - name: Install black
        run: python -m pip install black

      # step 4: check code formatting
      - name: Check code formatting with black
        run: black --check image_retrieval_system tests




  security:
    # run security scanning with bandit on ubuntu
    runs-on: ubuntu-latest
    steps:
      # step 1: checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # step 2: install python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # step 3: install bandit for security scanning
      - name: Install bandit
        run: python -m pip install bandit

      # step 4: run security scan
      - name: Run bandit security scan
        run: bandit -r image_retrieval_system --exit-zero




